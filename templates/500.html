{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card-srt p-5 my-5">
            <i class="bi bi-x-octagon text-danger display-1 mb-4"></i>
            <h1 class="display-4 fw-bold">500</h1>
            <h3 class="mb-3">Server Error</h3>
            <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
            <a href="{{ url_for('dashboard') }}" class="btn btn-srt btn-lg"><i class="bi bi-house me-2"></i>Go to Dashboard</a>
            <button class="btn btn-outline-danger btn-lg ms-2" onclick="location.reload()"><i class="bi bi-arrow-counterclockwise me-2"></i>Retry</button>
        </div>
    </div>
</div>
{% endblock %}
